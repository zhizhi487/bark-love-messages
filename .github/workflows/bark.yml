name: Bark Love Messages

on:
  schedule:
    - cron: '0 0 * * *'    # 每天00:00 UTC（北京时间08:00，但我们要改）
    - cron: '0 1 * * *'    # 每天01:00 UTC（北京时间09:00）
  workflow_dispatch:  # 手动触发

jobs:
  send-morning:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
        
      - name: Send morning message
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          MSG_TYPE: morning
        run: python script.py

  send-night:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * *'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
        
      - name: Send night message
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          MSG_TYPE: night
        run: python script.py
