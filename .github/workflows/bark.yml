name: Bark Love Messages

on:
  schedule:
    - cron: '0 16 * * *'    # 每天16:00 UTC = 北京时间00:00（晚安）
    - cron: '0 1 * * *'     # 每天01:00 UTC = 北京时间09:00（早安）
  workflow_dispatch:  # 手动触发

jobs:
  send-morning:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
        
      - name: Send morning message
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          MSG_TYPE: morning
        run: python script.py

  send-night:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 16 * * *' || github.event_name == 'workflow_dispatch'
    # ↑ 关键修复：'0 0' → '0 16'，加上 workflow_dispatch 支持手动测试
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
        
      - name: Send night message
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          MSG_TYPE: night
        run: python script.py
